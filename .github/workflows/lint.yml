name: lint
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: lint proto files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - uses: bufbuild/buf-lint-action@v1
      - uses: bufbuild/buf-breaking-action@v1
        with:
          against: "https://github.com/${GITHUB_REPOSITORY}.git#branch=main"

  generate-check:
    name: check build proto
    runs-on: ubuntu-latest
    steps:
      - name: build proto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        run: |
          make gen

      - name: verify change code
        run: |
          git add .
          git diff --staged --exit-code || (git diff --staged && exit 1)